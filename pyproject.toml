[tool.ruff]
target-version = "py311"
line-length = 120
exclude = [
  ".build",
  "dist",
  ".tmp-tests",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "UP"]
ignore = ["E402"]

[tool.ruff.lint.per-file-ignores]
"apps/nmos_greeter/nmos_greeter/main.py" = ["I001"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = false
warn_unused_configs = true
show_error_codes = true
check_untyped_defs = true
files = [
  "apps/nmos_common",
  "apps/nmos_control_center",
  "apps/nmos_greeter",
  "apps/nmos_persistent_storage",
  "apps/nmos_settings",
  "apps/nmos_update",
  "config/system-overlay/usr/local/lib/nmos",
]

[[tool.mypy.overrides]]
module = [
  "dbus",
  "dbus.*",
  "gi",
  "gi.*",
  "stem.control",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests/python"]
addopts = "-p no:cacheprovider"
norecursedirs = [
  ".git",
  ".pytest_cache",
  "pytest-cache-files-*",
  ".tmp-tests",
  "dist",
]
