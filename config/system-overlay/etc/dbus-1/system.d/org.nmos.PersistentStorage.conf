<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy context="default">
    <deny send_destination="org.nmos.PersistentStorage"/>
  </policy>

  <policy user="root">
    <allow own="org.nmos.PersistentStorage"/>
    <allow send_destination="org.nmos.PersistentStorage"/>
  </policy>

  <policy user="Debian-gdm">
    <allow send_destination="org.nmos.PersistentStorage" send_interface="org.nmos.PersistentStorage"/>
  </policy>
</busconfig>
