<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy context="default">
    <deny own="org.nmos.Settings1"/>
    <deny send_destination="org.nmos.Settings1"/>
  </policy>

  <policy user="root">
    <allow own="org.nmos.Settings1"/>
    <allow send_destination="org.nmos.Settings1"/>
  </policy>

  <policy user="@NMOS_GDM_USER@">
    <allow send_destination="org.nmos.Settings1" send_interface="org.nmos.Settings1"/>
  </policy>

  <policy at_console="true">
    <allow send_destination="org.nmos.Settings1" send_interface="org.nmos.Settings1"/>
  </policy>
</busconfig>
