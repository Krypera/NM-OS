name: NM-OS Smoke

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Quality Tooling
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install ruff mypy pytest
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run Smoke Checks
        shell: bash
        run: |
          set -euo pipefail
          bash ./tests/smoke/verify-structure.sh
          bash ./tests/smoke/verify-python.sh
          bash ./tests/smoke/verify-quality-tooling.sh
          bash ./tests/smoke/verify-build-hygiene.sh
          bash ./tests/smoke/verify-version-policy.sh
          bash ./tests/smoke/verify-boot-modes.sh
          bash ./tests/smoke/verify-brave-optional.sh
          bash ./tests/smoke/verify-greeter-state.sh
          bash ./tests/smoke/verify-greeter-i18n.sh
          bash ./tests/smoke/verify-live-login-config.sh
          bash ./tests/smoke/verify-network-gate-transition.sh
          bash ./tests/smoke/verify-network-status-normalization.sh
          bash ./tests/smoke/verify-prelogin-wiring.sh
          bash ./tests/smoke/verify-persistence-state-machine.sh
          bash ./tests/smoke/verify-runtime-logic.sh
          bash ./tests/smoke/verify-disk-safety.sh
          bash ./tests/smoke/verify-leaks.sh

  build-smoke:
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo bash ./build/install-deps.sh

      - name: Build Image
        shell: bash
        run: |
          set -euo pipefail
          sudo bash ./build/build.sh
          sudo chown -R "${USER}:${USER}" dist .build

      - name: Verify Build Artifacts
        shell: bash
        run: |
          set -euo pipefail
          bash ./tests/smoke/verify-artifacts.sh

      - name: Run QEMU Smoke
        shell: bash
        env:
          NMOS_QEMU_EXPECT_NETWORK_MARKER: "0"
        run: |
          set -euo pipefail
          bash ./build/smoke-qemu.sh
